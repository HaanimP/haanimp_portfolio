    <path d="M0,-4 C0.2,-1.1 1.1,-0.2 4,0 C1.1,0.2 0.2,1.1 0,4 C-0.2,1.1 -1.1,0.2 -4,0 C-1.1,-0.2 -0.2,-1.1 0,-4Z" fill="#fdfaf4" style="fill:rgb(253, 250, 244);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
